<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="个人记账">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>个人记账</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 通知权限横幅 -->
  <div id="notification-banner" class="hidden">
    📢 开启通知，每周日下午接收财务提醒
    <button>立即开启</button>
  </div>

  <!-- ==================== 认证页 ==================== -->
  <div id="auth-page" class="page">
    <div class="auth-container">
      <div class="auth-logo">💰</div>
      <h1 class="auth-title">个人记账</h1>
      <p class="auth-subtitle">记录每一笔，看清你的财富</p>
      <form id="auth-form" class="auth-form">
        <input type="email" id="auth-email" class="input" placeholder="邮箱地址" autocomplete="email" required>
        <input type="password" id="auth-password" class="input" placeholder="密码（至少6位）" autocomplete="current-password" minlength="6" required>
        <p id="auth-error" class="auth-error hidden"></p>
        <button type="submit" id="auth-submit-btn" class="btn btn-primary btn-full">登 录</button>
      </form>
      <p class="auth-switch">
        <span id="auth-switch-text">没有账号？</span>
        <button id="auth-switch-btn" class="btn-link">立即注册</button>
      </p>
      <p class="auth-switch" style="margin-top:8px">
        <button id="forgot-password-btn" class="btn-link">忘记密码？</button>
      </p>
    </div>
  </div>

  <!-- ==================== App 主体（登录后可见） ==================== -->
  <div id="app-shell" class="hidden">

    <!-- 顶部导航 -->
    <header class="top-bar">
      <span class="top-bar-title" id="page-title">首页</span>
      <span id="user-email-display" class="user-email"></span>
      <button id="logout-btn" class="btn-icon" title="登出">⟪</button>
    </header>

    <!-- ========== 首页仪表盘 ========== -->
    <section id="page-dashboard" class="page">
      <div class="summary-cards">
        <div class="card summary-card">
          <div class="summary-label">今日支出</div>
          <div class="summary-value expense-color" id="stat-today-expense">¥ 0.00</div>
        </div>
        <div class="card summary-card">
          <div class="summary-label">今日收入</div>
          <div class="summary-value income-color" id="stat-today-income">¥ 0.00</div>
        </div>
        <div class="card summary-card">
          <div class="summary-label">本月支出</div>
          <div class="summary-value expense-color" id="stat-month-expense">¥ 0.00</div>
        </div>
        <div class="card summary-card savings-card">
          <div class="summary-label">当前储蓄</div>
          <div class="summary-value savings-color" id="stat-savings">¥ 0.00</div>
        </div>
      </div>

      <!-- 本月支出类型分布 -->
      <div class="card chart-card">
        <div class="card-title">本月支出类型</div>
        <div class="mini-pie-container">
          <canvas id="mini-pie-chart" height="200"></canvas>
        </div>
        <div id="mini-pie-legend" class="mini-legend"></div>
      </div>

      <!-- 近期交易 -->
      <div class="card">
        <div class="card-title">近期交易</div>
        <div id="recent-transactions" class="transaction-list">
          <p class="empty-hint">暂无交易记录</p>
        </div>
      </div>
    </section>

    <!-- ========== 添加支出 ========== -->
    <section id="page-add-expense" class="page hidden">
      <form id="expense-form" class="data-form">
        <div class="form-group">
          <label class="form-label">金额</label>
          <div class="amount-input-wrapper">
            <span class="currency-sign">¥</span>
            <input type="number" id="expense-amount" class="input amount-input" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">日期</label>
          <input type="date" id="expense-date" class="input" required>
        </div>

        <div class="form-group">
          <label class="form-label">类型</label>
          <div class="segmented-control" id="expense-type-toggle">
            <button type="button" class="segment active" data-value="consumption">🛒 消费</button>
            <button type="button" class="segment" data-value="waste">🗑️ 浪费</button>
            <button type="button" class="segment" data-value="investment">📈 投资</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">分类</label>
          <div class="category-grid" id="expense-category-grid">
            <button type="button" class="chip" data-value="饮食">🍽️ 饮食</button>
            <button type="button" class="chip" data-value="住宿">🏠 住宿</button>
            <button type="button" class="chip" data-value="医药">💊 医药</button>
            <button type="button" class="chip" data-value="交通">🚗 交通</button>
            <button type="button" class="chip" data-value="购物">🛍️ 购物</button>
            <button type="button" class="chip" data-value="娱乐">🎮 娱乐</button>
            <button type="button" class="chip" data-value="教育">📚 教育</button>
            <button type="button" class="chip" data-value="其他">📦 其他</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">备注</label>
          <input type="text" id="expense-note" class="input" placeholder="可选备注">
        </div>

        <p id="expense-error" class="form-error hidden"></p>
        <button type="submit" class="btn btn-primary btn-full">记录支出</button>
      </form>
    </section>

    <!-- ========== 添加收入 ========== -->
    <section id="page-add-income" class="page hidden">
      <form id="income-form" class="data-form">
        <div class="form-group">
          <label class="form-label">金额</label>
          <div class="amount-input-wrapper">
            <span class="currency-sign">¥</span>
            <input type="number" id="income-amount" class="input amount-input" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">日期</label>
          <input type="date" id="income-date" class="input" required>
        </div>

        <div class="form-group">
          <label class="form-label">分类</label>
          <select id="income-category" class="input select-input" required>
            <option value="工资">💰 工资</option>
            <option value="投资">📈 投资</option>
            <option value="退款">↩️ 退款</option>
            <option value="兼职">💼 兼职</option>
            <option value="其他">📦 其他</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">备注</label>
          <input type="text" id="income-note" class="input" placeholder="可选备注">
        </div>

        <p id="income-error" class="form-error hidden"></p>
        <button type="submit" class="btn btn-primary btn-full">记录收入</button>
      </form>
    </section>

    <!-- ========== 历史记录 ========== -->
    <section id="page-history" class="page hidden">
      <div class="history-controls">
        <input type="text" id="history-search" class="input" placeholder="搜索备注...">
        <div class="history-filters">
          <input type="date" id="history-date-from" class="input input-small">
          <span>至</span>
          <input type="date" id="history-date-to" class="input input-small">
          <select id="history-type-filter" class="input input-small">
            <option value="all">全部</option>
            <option value="expense">支出</option>
            <option value="income">收入</option>
          </select>
        </div>
        <button id="export-csv-btn" class="btn btn-secondary btn-full">导出 CSV</button>
      </div>
      <div id="history-list" class="transaction-list">
        <p class="empty-hint">暂无记录</p>
      </div>
      <button id="history-load-more" class="btn btn-secondary btn-full hidden">加载更多</button>
    </section>

    <!-- ========== 图表 ========== -->
    <section id="page-charts" class="page hidden">
      <div class="month-nav">
        <button id="chart-month-prev" class="btn-icon">‹</button>
        <span id="chart-month-label">2026年5月</span>
        <button id="chart-month-next" class="btn-icon">›</button>
      </div>
      <div class="card chart-card">
        <div class="card-title">本月支出分类分布</div>
        <canvas id="category-doughnut" height="260"></canvas>
      </div>
      <div class="card chart-card">
        <div class="card-title">近6月收支对比</div>
        <canvas id="monthly-bar" height="260"></canvas>
      </div>
      <div class="card chart-card">
        <div class="card-title">累计储蓄趋势</div>
        <canvas id="savings-line" height="260"></canvas>
      </div>
    </section>

    <!-- ========== 预算管理 ========== -->
    <section id="page-budget" class="page hidden">
      <div id="budget-list" class="budget-list">
        <p class="empty-hint">暂无预算设置</p>
      </div>
      <button id="add-budget-btn" class="btn btn-primary btn-full">添加预算</button>
    </section>
  </div>

  <!-- ==================== 底部导航栏 ==================== -->
  <nav id="bottom-tab-bar" class="bottom-tab-bar hidden">
    <button class="tab-item active" data-page="dashboard">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首页</span>
    </button>
    <button class="tab-item" data-page="add-expense">
      <span class="tab-icon">➖</span>
      <span class="tab-label">支出</span>
    </button>
    <button class="tab-item" data-page="add-income">
      <span class="tab-icon">➕</span>
      <span class="tab-label">收入</span>
    </button>
    <button class="tab-item" data-page="charts">
      <span class="tab-icon">📊</span>
      <span class="tab-label">图表</span>
    </button>
    <button class="tab-item" data-page="budget">
      <span class="tab-icon">🎯</span>
      <span class="tab-label">预算</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- 预算编辑弹窗 -->
  <div id="budget-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content card">
      <h3 id="budget-modal-title">设置预算</h3>
      <select id="budget-modal-category" class="input select-input">
      </select>
      <input type="number" id="budget-modal-amount" class="input" placeholder="每月限额" step="0.01" min="0">
      <div class="modal-actions">
        <button id="budget-modal-cancel" class="btn btn-secondary">取消</button>
        <button id="budget-modal-save" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content card">
      <p id="confirm-modal-message">确定要删除这条记录吗？</p>
      <div class="modal-actions">
        <button id="confirm-modal-cancel" class="btn btn-secondary">取消</button>
        <button id="confirm-modal-ok" class="btn btn-danger">删除</button>
      </div>
    </div>
  </div>

  <!-- 外部库 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- 应用脚本 -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/router.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/income.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/history.js"></script>
  <script src="js/export.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/offline.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
